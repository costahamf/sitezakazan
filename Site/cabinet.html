<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Личный кабинет | Футбекс</title>
  <meta name="description" content="Заготовка под личный кабинет: родители, тренеры, админы." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Russo+One&display=swap" rel="stylesheet">

  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <link href="assets/css/theme-football.css" rel="stylesheet">
</head>
<body data-page="cabinet" tabindex="0">

  <div id="siteNav"></div>

  <header id="home" class="hero hero--page hero--plain">
    <div class="container">
      <div class="d-flex align-items-center gap-2 mb-3" data-aos="fade-up">
        <span class="badge-soft"><i class="bi bi-person-circle me-1"></i> родители • тренеры • админы</span>
        <a class="ms-auto btn btn-outline-accent btn-sm px-3" href="index.html"><i class="bi bi-arrow-left"></i> На главную</a>
      </div>

      <h1 class="display-6 mb-2" style="font-weight:950; letter-spacing:-.8px;" data-aos="fade-up" data-aos-delay="60">
        Личный кабинет
      </h1>
      <div class="muted" data-aos="fade-up" data-aos-delay="120">
        Заготовка под будущий кабинет на Strapi. Авторизацию и роли подключим позже.
      </div>
    </div>
  </header>

  <section class="py-5">
  <div class="container" data-aos="fade-up">
    <div class="d-flex justify-content-center">
      <div class="card-dark p-4" style="max-width: 520px; width: 100%;">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="fw-bold">Вход</div>
          <span class="badge-soft">шаблон</span>
        </div>
        <div class="muted small mb-3">Здесь появится авторизация через Strapi (JWT) — подключим позже.</div>

        <form class="row g-2">
          <div class="col-12">
            <label class="form-label muted small">Email / телефон</label>
            <input class="form-control form-control-lg" placeholder="example@mail.com" />
          </div>
          <div class="col-12">
            <label class="form-label muted small">Пароль</label>
            <input type="password" class="form-control form-control-lg" placeholder="••••••••" />
          </div>
          <div class="col-12 d-grid mt-2">
            <button type="button" class="btn btn-accent btn-lg" disabled>Войти (подключим позже)</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

  <div id="siteFooter"></div>
  <div id="siteModalHost"></div>
  <div id="siteFloatingHost"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/app.js"></script>

  <script src="assets/js/forms.js"></script>
  <script src="assets/js/quiz.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
