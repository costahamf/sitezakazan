<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Локации и филиалы | Футбекс</title>
  <meta name="description" content="Выберите ближайший филиал: карта + список + поиск. Запись на пробное занятие." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Russo+One&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <link href="assets/css/theme-football.css" rel="stylesheet">

  <style>
    #map{
      width: 100%;
      height: 520px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(190,255,220,.12);
      box-shadow: var(--shadow);
      overflow: hidden;
      background: rgba(10,16,14,.35);
    }
    @media (max-width: 992px){
      /* немного выше, чтобы на мобильных помещалось больше меток */
      #map{ height: 520px; }
    }

    @media (max-width: 575.98px){
      /* расширяем карту до краёв контейнера + чуть "отдаляем" */
      .map-wrap{ margin-left: -12px; margin-right: -12px; }
      #map{ border-radius: 18px; }
      #map .yandex-map{ transform: scale(.84); transform-origin: center center; }
    }

    /* Yandex constructor maps (responsive) */
    #map{ position: relative; }
    #map .yandex-map{ position: absolute; inset: 0; }
    #map .yandex-map > *,
    #map iframe{
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      display: block;
    }

  </style>
</head>

<body data-page="locations" tabindex="0">

  <div id="siteNav"></div>

  <header id="home" class="hero hero--plain">
    <div class="container">
      <div class="row g-3 align-items-end">
        <div class="col-lg-10" data-aos="fade-up">
          <h1 class="display-6" style="font-weight:950; letter-spacing:-.8px;">
            Выберите город и филиал
          </h1>
          <div class="neon-rule my-3"></div>
        </div>
      </div>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="row g-3 align-items-stretch">
        <div class="col-lg-5" data-aos="fade-up">
          <div class="card-dark p-4 h-100">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
              <div>
                <h2 class="section-title mb-1">Список филиалов</h2>
                <div class="muted">Найди по адресу или выбери на карте</div>
              </div>
              <button class="btn btn-outline-accent px-4" data-bs-toggle="modal" data-bs-target="#signupModal">
                Записаться
              </button>
            </div>

            <div class="soft-line my-3"></div>

            <div class="row g-2">
              <div class="col-12">
                <label class="form-label muted small">Город</label>
                <select id="locCitySelect" class="form-select glass-select" aria-label="Выбор города">
                  <option value="" selected>Выберите город</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label muted small">Локация</label>
                <select id="locBranchSelect" class="form-select glass-select" aria-label="Выбор локации" disabled>
                  <option value="" selected>Сначала выберите город</option>
                </select>
              </div>
            </div>

            <div id="locationsList" class="mt-3"></div>
          </div>
        </div>

        <div class="col-lg-7" data-aos="fade-up" data-aos-delay="120">
          <div class="map-wrap is-locked" id="mapWrap">
            <div id="map" class="rounded-5 overflow-hidden border border-accent-soft map-locked" style="height:520px; background:rgba(0,0,0,.25)">
            <div id="ymap-nsk" class="yandex-map" data-city="Новосибирск">
              <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3A9eab9081803e68d3f8a59d079d2df983ef5c8f3db74d4b15a1dfb37e58ded63b&width=100%25&height=520&lang=ru_RU&scroll=false"></script>
            </div>
            <div id="ymap-tlt" class="yandex-map d-none" data-city="Тольятти">
              <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3Af9975a01816521bd1bcfee1389f6d25977d186e1a062b80d6c35bd40172e55d8&width=100%25&height=520&lang=ru_RU&scroll=false"></script>
            </div>
          </div>
            <div class="map-gate" id="mapGate">
              <div class="map-gate-inner">
                <div class="map-gate-title">Выберите город</div>
                <div class="muted small">Карта и локации станут активными после выбора города.</div>
              </div>
            </div>
          </div>

          <!-- Desktop only: компактная подсказка + CTA -->
          <div class="glass p-3 mt-3 d-none d-lg-block">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold">Расписание</div>
                <div class="muted small" id="scheduleSummary">Тренировки идут в будни и выходные...</div>
              </div>
              <a class="btn btn-accent px-4" href="schedule.html">Расписание</a>
            </div>
          </div>

          <!-- Mobile: просто кнопка (без громоздкого блока) -->
          <a class="btn btn-outline-accent w-100 mt-3 d-lg-none" href="schedule.html">
            <i class="bi bi-calendar-week me-1"></i> Расписание
          </a>

        </div>
      </div>

      <!-- removed: "Быстрый выбор → запись" (лишняя громоздкость) -->

    </div>
  </section>

  <div id="siteFooter"></div>
  <div id="siteModalHost"></div>
  <div id="siteFloatingHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", ()=>{
      const el = document.getElementById("scheduleSummary");
      if(el) el.textContent = SITE_DATA.schedule.summary;
    });
  </script>

  <script src="assets/js/locations.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/forms.js"></script>
</body>
</html>
