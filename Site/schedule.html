<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Расписание | Футбекс</title>
  <meta name="description" content="Расписание тренировок: фильтры по городу, району, филиалу, возрасту и направлению." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Russo+One&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <link href="assets/css/theme-football.css" rel="stylesheet">
</head>

<body data-page="schedule" class="page schedule-page" tabindex="0">

  <div id="siteNav"></div>

  <main class="schedule-top">
    <div class="container" data-aos="fade-up">
      <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
        <div>
          <h1 class="display-6 mb-1" style="font-weight:950; letter-spacing:-.8px;">Расписание тренировок</h1>
          <div class="muted">Выберите фильтры — покажем доступные варианты.</div>
        </div>
        <div class="muted small"><i class="bi bi-info-circle me-1"></i>Данные обновляются из Excel через экспорт в JSON</div>
      </div>

      <div class="schedule-panel p-3 p-lg-4 mb-3">
        <div class="filter-row mb-3" id="scheduleFilters">
          <div>
            <label class="form-label muted small mb-1">Город</label>
            <select class="form-select form-select-sm" id="fCity"></select>
          </div>
          <div>
            <label class="form-label muted small mb-1">Направление</label>
            <select class="form-select form-select-sm" id="fDirection" disabled></select>
          </div>
          <div>
            <label class="form-label muted small mb-1">Район</label>
            <select class="form-select form-select-sm" id="fDistrict" disabled></select>
          </div>
          <div>
            <label class="form-label muted small mb-1">Филиал</label>
            <select class="form-select form-select-sm" id="fBranch" disabled></select>
          </div>
          <div>
            <label class="form-label muted small mb-1">Возраст</label>
            <select class="form-select form-select-sm" id="fAge" disabled></select>
          </div>
        </div>

        <div class="d-flex flex-wrap justify-content-between gap-2 align-items-center">
          <div class="chips" id="activeChips"></div>
          <div class="d-flex align-items-center gap-2">
            <div class="muted small">Найдено: <span id="foundCount" class="fw-bold">0</span></div>
            <button class="btn btn-outline-accent btn-sm px-3" id="resetFilters" type="button">
              <i class="bi bi-arrow-counterclockwise me-1"></i>Сбросить
            </button>
          </div>
        </div>
      </div>

      <!-- Desktop week grid -->
      <div class="week-grid" id="weekGrid"></div>

      <!-- Mobile accordion -->
      <div class="schedule-accordion">
        <div class="accordion" id="daysAccordion"></div>
      </div>
    </div>
  </main>

  <div id="siteFooter"></div>
  <div id="siteModalHost"></div>
  <div id="siteFloatingHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/app.js"></script>

  <script src="assets/js/schedule.js"></script>
  <script>
    AOS.init({ once:true, duration: 650, easing: "ease-out-cubic" });
  </script>
</body>
</html>
