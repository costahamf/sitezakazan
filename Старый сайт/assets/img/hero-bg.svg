<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="fog" cx="70%" cy="25%" r="70%">
      <stop offset="0" stop-color="rgba(255,255,255,.18)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="field" x1="0" y1="540" x2="0" y2="900">
      <stop stop-color="#0c1a12"/>
      <stop offset="1" stop-color="#050806"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="rgba(100,214,59,0)"/>
      <stop offset="0.5" stop-color="rgba(100,214,59,.28)"/>
      <stop offset="1" stop-color="rgba(100,214,59,0)"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#050806"/>
  <rect width="1600" height="900" fill="url(#fog)"/>

  <!-- Stadium lights dots -->
  <g opacity=".35">
    <circle cx="1120" cy="120" r="3" fill="#ffffff"/>
    <circle cx="1160" cy="130" r="2" fill="#ffffff"/>
    <circle cx="1200" cy="140" r="3" fill="#ffffff"/>
    <circle cx="1240" cy="155" r="2" fill="#ffffff"/>
    <circle cx="1280" cy="170" r="3" fill="#ffffff"/>
    <circle cx="1320" cy="185" r="2" fill="#ffffff"/>
    <circle cx="1360" cy="200" r="3" fill="#ffffff"/>
    <circle cx="1400" cy="220" r="2" fill="#ffffff"/>
  </g>

  <!-- Green beams -->
  <g opacity=".55">
    <path d="M200 720C520 560 860 450 1500 250" stroke="url(#beam)" stroke-width="28" />
    <path d="M0 820C520 650 900 520 1600 330" stroke="url(#beam)" stroke-width="18" />
  </g>

  <!-- Field -->
  <rect y="560" width="1600" height="340" fill="url(#field)"/>
  <g opacity=".25">
    <path d="M0 730H1600" stroke="rgba(255,255,255,.20)" stroke-width="2"/>
    <path d="M0 650H1600" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <path d="M0 810H1600" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <path d="M800 560V900" stroke="rgba(255,255,255,.10)" stroke-width="2"/>
    <circle cx="800" cy="730" r="90" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="3"/>
  </g>

  <!-- Ball -->
  <g transform="translate(1240 640)" opacity=".9">
    <circle cx="90" cy="90" r="78" fill="rgba(235,245,240,.92)" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
    <path d="M90 46l20 14-7 24H77l-7-24 20-14Z" fill="rgba(10,16,14,.85)"/>
    <circle cx="68" cy="70" r="3" fill="rgba(100,214,59,.8)"/>
    <circle cx="112" cy="70" r="3" fill="rgba(100,214,59,.8)"/>
    <circle cx="90" cy="128" r="3" fill="rgba(100,214,59,.8)"/>
  </g>
</svg>
